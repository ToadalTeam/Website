<style>
.muscle-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.mtab{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:8px 16px;border-radius:2px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(245,240,232,.6);cursor:pointer;transition:all .2s}
.mtab:hover,.mtab.active{background:var(--green-mid);border-color:var(--green-mid);color:var(--cream)}
.ex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.ex-card{background:var(--green-card);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,.06);transition:border-color .2s,transform .2s}
.ex-card:hover{border-color:rgba(201,168,76,.3);transform:translateY(-3px)}
.ex-thumb{height:130px;background:#0A1F12;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.ex-thumb svg{width:100%;height:100%}
.ex-muscle-tag{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:2px;background:rgba(10,31,18,.8)}
.ex-info{padding:14px 16px}
.ex-title{font-size:14px;font-weight:600;color:var(--cream);margin-bottom:4px}
.ex-desc{font-size:12px;font-weight:300;color:var(--green-light);line-height:1.5;margin-bottom:8px}
.ex-tags{display:flex;gap:4px;flex-wrap:wrap}
.ex-tag{font-size:10px;padding:2px 7px;border-radius:2px;background:rgba(201,168,76,.1);color:var(--gold);font-weight:600}
</style>
</head>

<div class="page-hero">
  <div class="container">
    <span class="section-label">Tools</span>
    <h1 class="section-title">Exercise Library.</h1>
    <p>Video breakdowns of every exercise in our programs. Full coaching cues, common mistakes, and progressions — organized by muscle group. Free for everyone.</p>
  </div>
</div>

// ── Drawing helpers ──
function W(body){return`<svg viewBox="0 0 240 130" xmlns="http://www.w3.org/2000/svg"><rect width="240" height="130" fill="#0A1F12"/>${body}</svg>`}
function L(x1,y1,x2,y2,w,c){return`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c||'#2A8A55'}" stroke-width="${w||6}" stroke-linecap="round"/>`}
function H(x,y){return`<circle cx="${x}" cy="${y}" r="9" fill="#2A7A45" stroke="#3AAA68" stroke-width="1.2"/>`}
function J(x,y,c){return`<circle cx="${x}" cy="${y}" r="4" fill="${c||'#3AAA68'}"/>`}
function BB(x,y,w,h,c){return`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="2" fill="${c||'#C9A84C'}"/>`}
function FL(){return`<line x1="10" y1="122" x2="230" y2="122" stroke="rgba(201,168,76,.2)" stroke-width="1"/>`}
function TX(x,y,t,c,a){return`<text x="${x}" y="${y}" font-family="Arial,sans-serif" font-size="9" fill="${c||'rgba(201,168,76,.55)'}" text-anchor="${a||'middle'}">${t}</text>`}
function ARC(d,c){return`<path d="${d}" stroke="${c||'#C9A84C'}" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity=".8"/>`}

const tagColors = {legs:'#533AB7',back:'#854F0B',chest:'#A32D2D',shoulders:'#185FA5',arms:'#0F6E56',core:'#1D9E75',full:'#906810'};
let active = 'all';

function filter(m, btn) {
  active = m;
  document.querySelectorAll('.mtab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = active === 'all' ? exercises : exercises.filter(e => e.muscle === active);
  document.getElementById('ex-grid').innerHTML = list.map(e => `
    <div class="ex-card">
      <div class="ex-thumb">
        ${SVGS[e.name] || W(`<text x="120" y="70" font-family="Arial" font-size="11" fill="rgba(245,240,232,.2)" text-anchor="middle">${e.name}</text>`)}
        <div class="ex-muscle-tag" style="color:${tagColors[e.muscle]||'#C9A84C'}">${e.muscle}</div>
      </div>
      <div class="ex-info">
        <div class="ex-title">${e.name}</div>
        <div class="ex-desc">${e.desc}</div>
        <div class="ex-tags">${e.tags.map(t => `<span class="ex-tag">${t}</span>`).join('')}</div>
      </div>
    </div>`).join('');
}

render();
