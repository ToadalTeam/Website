<style>
.eq-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:28px}
.etab{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:8px 16px;border-radius:2px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(245,240,232,.6);cursor:pointer;transition:all .2s}
.etab:hover,.etab.active{background:var(--green-mid);border-color:var(--green-mid);color:var(--cream)}
.eq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.eq-card{background:var(--green-card);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,.06);transition:border-color .2s,transform .2s}
.eq-card:hover{border-color:rgba(201,168,76,.25);transform:translateY(-3px)}
.eq-img{height:140px;background:#0A1F12;display:flex;align-items:center;justify-content:center;overflow:hidden}
.eq-img svg{width:100%;height:100%}
.eq-body{padding:18px 20px}
.eq-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.eq-name{font-size:15px;font-weight:600;color:var(--cream)}
.eq-cat{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);background:rgba(201,168,76,.1);padding:2px 8px;border-radius:2px}
.eq-desc{font-size:13px;font-weight:300;color:var(--green-light);line-height:1.65;margin-bottom:10px}
.eq-uses{font-size:12px;font-weight:300;color:rgba(245,240,232,.5);line-height:1.6;margin-bottom:8px}
.eq-uses strong{color:var(--green-light);font-weight:500;font-style:normal}
.eq-tip{font-size:12px;font-weight:300;color:rgba(245,240,232,.38);margin-top:10px;padding:8px 12px;border-top:1px solid rgba(255,255,255,.05);font-style:italic;line-height:1.6}
</style>
</head>

function W(b){return`<svg viewBox="0 0 280 140" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="140" fill="#0A1F12"/>${b}</svg>`}

function L(x1,y1,x2,y2,w,c){return`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c||'#2A8A55'}" stroke-width="${w||4}" stroke-linecap="round"/>`}
function C(cx,cy,r,c){return`<circle cx="${cx}" cy="${cy}" r="${r||8}" fill="${c||'#C9A84C'}"/>`}
function TX(x,y,t,c,a){return`<text x="${x}" y="${y}" font-family="Arial,sans-serif" font-size="9" fill="${c||'rgba(201,168,76,.55)'}" text-anchor="${a||'middle'}">${t}</text>`}
function FL(y){return L(10,y||128,270,y||128,1,'rgba(201,168,76,.2)')}

  {name:'Smith Machine',cat:'machine',desc:'A barbell fixed to vertical rails that only moves straight up and down. Good for some exercises, limited for others.',uses:'Squats, bench press, shoulder press, and lunges — especially useful for beginners.',tip:'The fixed path means your body adapts to the machine rather than vice versa. Prefer free weights when possible.'},
  {name:'Leg Press Machine',cat:'machine',desc:'A sled machine where you push weight with your legs at an angle while seated. Allows very heavy loading safely.',uses:'Quad-dominant pressing, high-rep conditioning, and as a squat alternative when injured.',tip:'Foot position changes the muscle emphasis — higher feet targets hamstrings and glutes, lower targets quads.'},
  {name:'Hack Squat Machine',cat:'machine',desc:'A padded machine for squatting at an angle with your back supported.',uses:'Quad development. Good alternative when barbell squatting is uncomfortable.',tip:'Keep your heels planted and knees tracking over toes throughout.'},
  {name:'Chest Press Machine',cat:'machine',desc:'A seated pressing machine that mimics the bench press with a fixed path.',uses:'Chest, triceps, and shoulder development — useful when a spotter is not available.',tip:'Adjust the seat height so the handles are at mid-chest level.'},
  {name:'Lat Pulldown Machine',cat:'machine',desc:'A cable-based machine for vertical pulling. One of the best upper body builders.',uses:'Lat development, bicep work, and building toward pull-ups.',tip:'Think about pulling your elbows down and back — not just pulling the bar down.'},
  {name:'Cable Machine',cat:'cable',desc:'A weight stack connected to a pulley and cable. Provides constant tension through the entire range of motion.',uses:'Rows, flyes, tricep pushdowns, face pulls, woodchops, curls, and hundreds more.',tip:'Constant tension throughout the movement makes cables excellent for muscle growth.'},
  {name:'Cable Crossover',cat:'cable',desc:'Two cable machines facing each other. Allows chest flyes and crossover movements with adjustable angles.',uses:'Chest flyes at multiple angles, functional movements, and core rotation work.',tip:'Adjust the pulley height to emphasize different parts of the chest.'},
  {name:'Treadmill',cat:'cardio',desc:'A moving belt for walking, jogging, and running indoors. The most common cardio machine.',uses:'Steady-state cardio, interval training, and warm-up walks.',tip:'Incline walking at 10 to 15 percent grade burns significant calories with less joint impact than running.'},
  {name:'Stationary Bike',cat:'cardio',desc:'A fixed bicycle for low-impact cardiovascular exercise. Easy on the joints.',uses:'Warm-up, steady-state cardio, and HIIT intervals.',tip:'Adjust the seat height so your knee has a slight bend at the bottom of the pedal stroke.'},
  {name:'Rowing Machine',cat:'cardio',desc:'A full-body cardio machine that mimics rowing. Engages legs, back, and arms simultaneously.',uses:'Full body conditioning, low-impact HIIT, and building aerobic capacity.',tip:'The power comes from your legs first, then core, then arms. Most people do it backwards.'},
  {name:'Resistance Bands',cat:'home',desc:'Elastic bands ranging from light to very heavy resistance. Portable and extremely versatile.',uses:'Warm-up activation, assisted pull-ups, added resistance to barbell work, and full workouts.',tip:'Bands provide more resistance at the end of the movement — great for muscle activation.'},
  {name:'TRX / Suspension Trainer',cat:'home',desc:'Straps anchored to a wall, door, or rack. Uses your bodyweight at various angles for resistance.',uses:'Rows, push-ups, squats, lunges, core work — a full body workout with minimal equipment.',tip:'The more horizontal your body angle, the harder the exercise. Small adjustments make big differences.'},
  {name:'Foam Roller',cat:'accessory',desc:'A cylindrical foam tool used for self-myofascial release — basically a self-massage tool.',uses:'Pre-workout tissue prep, post-workout recovery, and addressing muscle tightness.',tip:'Roll slowly and pause on tender spots for 20 to 30 seconds. Do not roll directly on joints.'},
  {name:'Lifting Belt',cat:'accessory',desc:'A rigid belt worn around the waist to increase intra-abdominal pressure during heavy lifts.',uses:'Heavy squats, deadlifts, and overhead pressing.',tip:'A belt does not replace core strength — it enhances it. Only use for your heaviest sets.'},
  {name:'Wrist Wraps',cat:'accessory',desc:'Supportive fabric wrapped around the wrist joint to provide stability during pressing movements.',uses:'Heavy bench press, overhead press, and any movement where wrist stability is a concern.',tip:'Wrap at the wrist joint, not higher. They should support the joint, not restrict blood flow.'},
  {name:'Chalk',cat:'accessory',desc:'Magnesium carbonate applied to the hands to reduce sweat and improve grip on heavy pulling movements.',uses:"Deadlifts, pull-ups, rows, and any heavy pulling movement.",tip:'Not all gyms allow chalk. Liquid chalk is a less messy alternative accepted by most facilities.'},
];

const catColors = {free:'#C9A84C',machine:'#3AAA68',cable:'#185FA5',cardio:'#A32D2D',home:'#533AB7',accessory:'#854F0B'};
let active = 'all';

function filter(c, btn) {
  active = c;
  document.querySelectorAll('.etab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = active === 'all' ? equipment : equipment.filter(e => e.cat === active);
  document.getElementById('eq-grid').innerHTML = list.map(e => `
    <div class="eq-card">
      <div class="eq-img">${SVGS[e.name] || W(`<text x="140" y="75" font-family="Arial" font-size="12" fill="rgba(245,240,232,.2)" text-anchor="middle">${e.name}</text>`)}</div>
      <div class="eq-body">
        <div class="eq-top">
          <div class="eq-name">${e.name}</div>
          <div class="eq-cat" style="color:${catColors[e.cat]||'var(--gold)'}">${e.cat}</div>
        </div>
        <div class="eq-desc">${e.desc}</div>
        <div class="eq-uses"><strong>Used for:</strong> ${e.uses}</div>
        ${e.tip ? `<div class="eq-tip">${e.tip}</div>` : ''}
      </div>
    </div>`).join('');
}

render();
initReveal();
</script>
</body>
</html>
