<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipment Guide · Toadal Performance</title>
<link rel="stylesheet" href="style.css">
<style>
.eq-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:28px}
.etab{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:8px 16px;border-radius:2px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(245,240,232,.6);cursor:pointer;transition:all .2s}
.etab:hover,.etab.active{background:var(--green-mid);border-color:var(--green-mid);color:var(--cream)}
.eq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.eq-card{background:var(--green-card);border-radius:3px;padding:22px 24px;border:1px solid rgba(255,255,255,.06);transition:border-color .2s}
.eq-card:hover{border-color:rgba(201,168,76,.25)}
.eq-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.eq-icon{font-size:32px;flex-shrink:0}
.eq-name{font-size:15px;font-weight:600;color:var(--cream);margin-bottom:3px}
.eq-cat{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.eq-desc{font-size:13px;font-weight:300;color:var(--green-light);line-height:1.65;margin-bottom:10px}
.eq-uses{font-size:12px;font-weight:400;color:rgba(245,240,232,.55);line-height:1.6}
.eq-uses strong{color:var(--green-light);font-weight:500}
.eq-tip{font-size:12px;font-weight:300;color:rgba(245,240,232,.4);margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);font-style:italic}
</style>
</head>
<body>
<div class="page-hero">
  <div class="container">
    <span class="section-label">Tools</span>
    <h1 class="section-title">Equipment Guide.</h1>
    <p>Every piece of gym equipment explained — what it's called, what it does, and when to use it. No more wandering around the gym wondering what anything is.</p>
  </div>
</div>
<section class="section">
  <div class="container">
    <div class="eq-tabs">
      <button class="etab active" onclick="filter('all',this)">All</button>
      <button class="etab" onclick="filter('free',this)">Free Weights</button>
      <button class="etab" onclick="filter('machine',this)">Machines</button>
      <button class="etab" onclick="filter('cable',this)">Cable & Pulley</button>
      <button class="etab" onclick="filter('cardio',this)">Cardio</button>
      <button class="etab" onclick="filter('accessory',this)">Accessories</button>
      <button class="etab" onclick="filter('home',this)">Home Gym</button>
    </div>
    <div class="eq-grid" id="eq-grid"></div>
  </div>
</section>
<script src="shared.js"></script>
<script>
injectDisclaimer();
  injectNav('Tools');
injectFooter();
const equipment=[
  {name:'Barbell',cat:'free',icon:'',desc:'A long metal bar (usually 45 lbs) used for the biggest compound lifts. The foundation of serious strength training.',uses:'Squats, deadlifts, bench press, overhead press, rows, and Olympic lifts.',tip:'Most barbells in a commercial gym weigh 45 lbs. Always count the bar when calculating your total weight.'},
  {name:'Dumbbells',cat:'free',icon:'',desc:'Pairs of handheld weights ranging from 2–150+ lbs. The most versatile piece of equipment in any gym.',uses:'Virtually every exercise — presses, rows, curls, lunges, carries, and more.',tip:'Adjust the bench angle and your grip to target different parts of the same muscle group.'},
  {name:'Kettlebell',cat:'free',icon:'',desc:'A cast iron ball with a handle. The handle offset makes it ideal for ballistic, swinging, and carrying movements.',uses:'Swings, Turkish get-ups, goblet squats, carries, and pressing variations.',tip:'The standard swing is a hip hinge, not a squat. Keep your back flat and drive with your hips.'},
  {name:'EZ Curl Bar',cat:'free',icon:'',desc:'A wavy barbell that allows a more natural grip angle for arm and tricep exercises.',uses:'Bicep curls, skull crushers, upright rows, and close-grip presses.',tip:'The angled grip reduces wrist strain compared to a straight bar for curls.'},
  {name:'Trap Bar / Hex Bar',cat:'free',icon:'',desc:'A hexagonal or diamond-shaped bar you stand inside. Great for beginners and anyone with lower back limitations.',uses:'Deadlifts, farmer\'s carries, shrugs, and jump squats.',tip:'The trap bar deadlift puts less stress on the lower back than a conventional barbell deadlift.'},
  {name:'Smith Machine',cat:'machine',icon:'',desc:'A barbell fixed to vertical rails that only moves straight up and down. Good for some exercises, limited for others.',uses:'Squats, bench press, shoulder press, and lunges — especially useful for beginners learning movement patterns.',tip:'The fixed path means your body adapts to the machine rather than vice versa. Use free weights when possible.'},
  {name:'Leg Press Machine',cat:'machine',icon:'',desc:'A sled machine where you push weight with your legs at an angle while seated. Allows very heavy loading safely.',uses:'Quad-dominant pressing, high-rep conditioning, and as a squat alternative for injured athletes.',tip:'Foot position changes the muscle emphasis — higher feet targets hamstrings/glutes, lower feet targets quads.'},
  {name:'Hack Squat Machine',cat:'machine',icon:'',desc:'A padded machine for squatting at an angle with your back supported.',uses:'Quad development. Good alternative when barbell squatting is uncomfortable.',tip:'Keep your heels planted and knees tracking over toes throughout the movement.'},
  {name:'Chest Press Machine',cat:'machine',icon:'',desc:'A seated pressing machine that mimics the bench press with a fixed path.',uses:'Chest, triceps, and shoulder development — especially useful for beginners or when a spotter isn\'t available.',tip:'Adjust the seat height so the handles are at mid-chest level.'},
  {name:'Lat Pulldown Machine',cat:'machine',icon:'',desc:'A cable-based machine for vertical pulling. One of the best upper body builders.',uses:'Lat development, bicep work, and building toward pull-ups.',tip:'Think about pulling your elbows down and back — not just pulling the bar down.'},
  {name:'Cable Machine',cat:'cable',icon:'',desc:'A weight stack connected to a pulley and cable. Provides constant tension through the entire range of motion — unlike free weights.',uses:'Rows, flyes, tricep pushdowns, face pulls, woodchops, curls, and hundreds more.',tip:'Constant tension throughout the movement makes cables excellent for muscle growth — the muscle never gets a break.'},
  {name:'Cable Crossover',cat:'cable',icon:'',desc:'Two cable machines facing each other. Allows chest flyes and crossover movements with adjustable angles.',uses:'Chest flyes at multiple angles, functional movements, and core rotation work.',tip:'Adjust the pulley height to emphasize different parts of the chest (high = lower chest, low = upper chest).'},
  {name:'Treadmill',cat:'cardio',icon:'',desc:'A moving belt for walking, jogging, and running indoors. The most common cardio machine.',uses:'Steady-state cardio, interval training (HIIT), and warm-up walks.',tip:'Incline walking (10–15% at 3–4 mph) burns significant calories with much less joint impact than running.'},
  {name:'Stationary Bike',cat:'cardio',icon:'',desc:'A fixed bicycle for low-impact cardiovascular exercise. Easy on the joints.',uses:'Warm-up, steady-state cardio, and HIIT intervals.',tip:'Adjust the seat height so your knee has a slight bend (not fully extended) at the bottom of the pedal stroke.'},
  {name:'Rowing Machine',cat:'cardio',icon:'',desc:'A full-body cardio machine that mimics rowing. Engages legs, back, and arms simultaneously.',uses:'Full body conditioning, low-impact HIIT, and building aerobic capacity.',tip:'The power comes from your legs first (70%), then core, then arms. Most people do it backwards.'},
  {name:'Resistance Bands',cat:'home',icon:'',desc:'Elastic bands ranging from light to very heavy resistance. Portable and extremely versatile.',uses:'Warm-up activation, assisted pull-ups, added resistance to barbell work, and full workouts.',tip:'Bands provide more resistance at the end of the movement (peak contraction) — great for muscle activation.'},
  {name:'TRX / Suspension Trainer',cat:'home',icon:'',desc:'Straps anchored to a wall, door, or rack. Uses your bodyweight at various angles for resistance.',uses:'Rows, push-ups, squats, lunges, core work — full body with minimal equipment.',tip:'The more horizontal your body angle, the harder the exercise. Small adjustments = big difficulty changes.'},
  {name:'Foam Roller',cat:'accessory',icon:'',desc:'A cylindrical foam tool used for self-myofascial release (self-massage).',uses:'Pre-workout tissue prep, post-workout recovery, and addressing muscle tightness.',tip:'Roll slowly and pause on tender spots for 20–30 seconds. Don\'t roll directly on joints.'},
  {name:'Lifting Belt',cat:'accessory',icon:'',desc:'A rigid belt worn around the waist to increase intra-abdominal pressure during heavy lifts.',uses:'Heavy squats, deadlifts, and overhead pressing.',tip:'A belt doesn\'t replace core strength — it enhances it. Only use for your heaviest sets (85%+ of 1RM).'},
  {name:'Wrist Wraps',cat:'accessory',icon:'',desc:'Supportive fabric wrapped around the wrist joint to provide stability during pressing movements.',uses:'Heavy bench press, overhead press, and any movement where wrist stability is a concern.',tip:'Wrap at the wrist joint, not higher. They should support the joint, not restrict blood flow.'},
  {name:'Chalk',cat:'accessory',icon:'',desc:'Magnesium carbonate applied to the hands to reduce sweat and improve grip.',uses:'Deadlifts, pull-ups, rows, and any heavy pulling movement.',tip:'Not all gyms allow chalk. Liquid chalk is a less messy alternative accepted by most facilities.'},
];
let active='all';
function filter(c,btn){
  active=c;
  document.querySelectorAll('.etab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function render(){
  const list=active==='all'?equipment:equipment.filter(e=>e.cat===active);
  document.getElementById('eq-grid').innerHTML=list.map(e=>`
    <div class="eq-card">
      <div class="eq-top">
        <div><div class="eq-name">${e.name}</div><div class="eq-cat">${e.cat}</div></div>
      </div>
      <div class="eq-desc">${e.desc}</div>
      <div class="eq-uses"><strong>Used for:</strong> ${e.uses}</div>
      ${e.tip?`<div class="eq-tip"> ${e.tip}</div>`:''}
    </div>`).join('');
}
render();
initReveal();
</script>
</body>
</html>
